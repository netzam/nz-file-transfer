steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', '${_IMAGE}', '.']
  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_IMAGE}']
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
substitutions:
  _IMAGE: '${_GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_GAR_REPOSITORY}/nz-file-transfer:latest'
  _SERVICE: 'nz-file-transfer'
  _REGION: 'asia-southeast1'
  _GAR_LOCATION: 'asia-southeast1'
  _GAR_REPOSITORY: 'nz-apps'
# Use same GCP baseline as ai-chatbot: project netzam-wifi, region asia-southeast1.
